settings = {
      monitor = ",preferred,auto,auto";
      
      env = [
        "WLR_RENDERER_ALLOW_SOFTWARE,1"
        "XCURSOR_SIZE,24"
        "QT_QPA_PLATFORMTHEME,qt5ct"
      ];

      # 'exec-once' is the correct key for startup apps
      "exec-once" = [
        "waybar"
      ];

      input = {
        kb_layout = "us";
        follow_mouse = 1;
        touchpad = {
          natural_scroll = false;
        };
        sensitivity = 0;
      };

      general = {
        gaps_in = 5;
        gaps_out = 20;
        border_size = 2;
        "col.active_border" = "rgba(33ccffee) rgba(00ff99ee) 45deg";
        "col.inactive_border" = "rgba(595959aa)";
        layout = "dwindle";
        allow_tearing = false;
      };

      decoration = {
        rounding = 10;
        blur = {
          enabled = true;
          size = 3;
          passes = 1;
        };
        drop_shadow = true;
        shadow_range = 4;
        shadow_render_power = 3;
        "col.shadow" = "rgba(1a1a1aee)";
      };

      animations = {
        enabled = true;
        bezier = "myBezier, 0.05, 0.9, 0.1, 1.05";
        animation = [
          "windows, 1, 7, myBezier"
          "windowsOut, 1, 7, default, popin 80%"
          "border, 1, 10, default"
          "borderangle, 1, 8, default"
          "fade, 1, 7, default"
          "workspaces, 1, 6, default"
        ];
      };

      dwindle = {
        pseudotile = true;
        preserve_split = true;
      };

      master = {
        new_is_master = true;
      };

      gestures = {
        workspace_swipe = false;
      };

      misc = {
        force_default_wallpaper = -1;
      };

      device = {
        name = "epic-mouse-v1";
        sensitivity = -0.5;
      };

      # Binds
      bind = [
        "${mod}, Q, exec, kitty"
        "${mod}, C, killactive"
        "${mod}, M, exit"
        "${mod}, E, exec, dolphin"
        "${mod}, V, togglefloating"
        "${mod}, R, exec, wofi --show drun"
        "${mod}, P, pseudo"
        "${mod}, J, togglesplit"
        "${mod}, left, movefocus, l"
        "${mod}, right, movefocus, r"
        "${mod}, up, movefocus, u"
        "${mod}, down, movefocus, d"
        # Scratchpad
        "${mod}, S, togglespecialworkspace, magic"
        "${mod} SHIFT, S, movetoworkspace, special:magic"
        # Mouse
        "${mod}, mouse_down, workspace, e+1"
        "${mod}, mouse_up, workspace, e-1"
      ]
      # Workspaces 1-10
      ++ (map (i: "${mod}, ${toString (if i == 10 then 0 else i)}, workspace, ${toString i}") (lib.lists.range 1 10))
      ++ (map (i: "${mod} SHIFT, ${toString (if i == 10 then 0 else i)}, movetoworkspace, ${toString i}") (lib.lists.range 1 10));

      bindm = [
        "${mod}, mouse:272, movewindow"
        "${mod}, mouse:273, resizewindow"
      ];

      windowrulev2 = [
        "suppressevent maximize, class:.*"
      ];
    }
